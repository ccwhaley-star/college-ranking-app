<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- JCCC four-leaf logo - leaves radiate from bottom center -->
  <!-- Left teal leaf (pointing lower-left) -->
  <path d="M50 80 C30 65, 10 55, 15 35 C25 45, 40 60, 50 80Z" fill="#0097A9"/>
  <!-- Center-left dark teal leaf (pointing up-left) -->
  <path d="M50 80 C35 55, 25 30, 35 10 C40 30, 45 55, 50 80Z" fill="#00677F"/>
  <!-- Center-right lime leaf (pointing up-right) -->
  <path d="M50 80 C55 55, 65 30, 75 10 C70 30, 60 55, 50 80Z" fill="#B5BD00"/>
  <!-- Right green leaf (pointing lower-right) -->
  <path d="M50 80 C60 60, 80 45, 90 35 C85 55, 65 65, 50 80Z" fill="#78BE20"/>
</svg>