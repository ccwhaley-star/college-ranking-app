  <!-- Center-left dark teal leaf -->
  <path d="M60 70 C45 45, 35 20, 45 2 C50 20, 55 45, 60 70Z" fill="#00677F"/>
  <!-- Center-right lime leaf -->
  <path d="M60 70 C65 45, 75 20, 85 5 C80 25, 70 48, 60 70Z" fill="#B5BD00"/>
  <!-- Right green leaf -->
  <path d="M60 70 C70 55, 88 42, 98 30 C92 48, 75 58, 60 70Z" fill="#78BE20"/>
  <!-- Text: JOHNSON COUNTY -->
  <text x="60" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#003768" letter-spacing="1.5">JOHNSON COUNTY</text>
  <!-- Text: COMMUNITY COLLEGE -->
  <text x="60" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#003768" letter-spacing="1">COMMUNITY COLLEGE</text>
</svg>